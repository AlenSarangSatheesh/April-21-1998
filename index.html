<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Beautiful Moments</title>
  
  <!-- Modern Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Floating Particles Canvas -->
  <canvas id="particles-canvas"></canvas>

  <div class="app-container">
    <header class="header">
      <h1 class="title">Our Beautiful Moments</h1>
      <p class="subtitle">A little collection of our favorite memories and words</p>
    </header>

    <main class="gallery-container" id="gallery-container">
      <!-- Polaroids will be dynamically injected here -->
    </main>
  </div>

  <!-- Lightbox Overlay (Hidden by default) -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightbox-close">&times;</button>
    <div class="lightbox-content">
      <img src="" alt="Expanded View" id="lightbox-image">
      <p class="lightbox-caption" id="lightbox-caption"></p>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
